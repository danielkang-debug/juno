<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juno | Midwife Productivity Suite</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Main Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Scripting -->
    <script src="script.js" defer></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Juno Logo">
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item active" id="nav-dashboard">Dashboard</a>
                <a href="#" class="nav-item" id="nav-calendar">Calendar</a>
                <a href="#" class="nav-item" id="nav-routes">Routes</a>
                <a href="#" class="nav-item" id="nav-mothers">Mothers</a>
            </nav>

            <div style="margin-top: auto;">
                <a href="#" class="nav-item"> Settings </a>
            </div>
        </aside>

        <!-- Main Workspace — content injected by script.js -->
        <main class="main-content" id="app-view">
            <div class="loading-spinner">Loading Juno…</div>
        </main>
    </div>
</body>

</html>
