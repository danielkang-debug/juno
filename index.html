<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juno | Midwife Productivity Suite</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Main Styles -->
    <link rel="stylesheet" href="styles.css?v=1.1">
    <!-- Scripting -->
    <script src="js/main.js?v=2" type="module"></script>
</head>

<body>
    <div class="prototype-banner">
        <span id="banner-text">⚠️ Prototyp — Bitte keine sensiblen oder echten Patientendaten eingeben.</span>
        <button id="lang-toggle" class="lang-toggle-btn">EN</button>
    </div>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="assets/juno-wordmark.png" alt="Juno" style="height: 40px;">
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item active" id="nav-dashboard"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
                <a href="#" class="nav-item" id="nav-calendar"><span class="nav-icon">📅</span><span class="nav-label">Kalender</span></a>
                <a href="#" class="nav-item" id="nav-routes"><span class="nav-icon">🗺</span><span class="nav-label">Routen</span></a>
                <a href="#" class="nav-item" id="nav-mothers"><span class="nav-icon">👩</span><span class="nav-label">Mütter</span></a>
            </nav>

            <div class="nav-settings-wrap" style="margin-top: auto;">
                <div class="nav-user-info">
                    <span class="nav-user-name" id="user-name"></span>
                    <a href="#" class="nav-logout" id="logout-btn">Logout</a>
                </div>
            </div>
        </aside>

        <!-- Main Workspace — content injected by script.js -->
        <main class="main-content" id="app-view">
            <div class="loading-spinner">Loading Juno…</div>
        </main>
    </div>
</body>

</html>
